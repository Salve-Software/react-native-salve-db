name: Run React Native Harness Android

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/harness-android.yml'
      - 'example/**'
      - 'android/**'
      - 'ios/**'
      - 'cpp/**'
      - 'src/**'
      - 'nitrogen/**'
      - '*.podspec'
      - 'package.json'
      - 'bun.lock'
      - 'pnpm-lock.yaml'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'react-native.config.js'
      - 'nitro.json'
  pull_request:
    paths:
      - '.github/workflows/harness-android.yml'
      - 'example/**'
      - 'android/**'
      - 'ios/**'
      - 'cpp/**'
      - 'src/**'
      - 'nitrogen/**'
      - '*.podspec'
      - 'package.json'
      - 'bun.lock'
      - 'pnpm-lock.yaml'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'react-native.config.js'
      - 'nitro.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Android Harness
    runs-on: ubuntu-latest
    env:
      AVD_DISK_SIZE: 1G
      AVD_HEAP_SIZE: 1G
      AVD_NAME: Pixel_7_API_36
      DEVICE_API_LEVEL: '36'
      DEVICE_ARCH: x86_64
      DEVICE_PROFILE: pixel_7
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '24'


      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android app
        working-directory: example/android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=${{ env.DEVICE_ARCH }}

      - name: Run React Native Harness
        uses: callstackincubator/react-native-harness@v1.2.0
        with:
          app: android/app/build/outputs/apk/debug/app-debug.apk
          runner: android
          projectRoot: example
          packageManager: npm

      - name: Stop Gradle
        if: always()
        working-directory: example/android
        run: |
          chmod +x ./gradlew
          ./gradlew --stop
